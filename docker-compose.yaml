# =============================================================================
# Openclaw Mail Agent — Docker Compose
# =============================================================================
# Zero-install: `docker compose up mail-tidy`
# =============================================================================

services:
  # One-shot email tidy
  mail-tidy:
    build: .
    env_file: .env
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./reports:/app/reports
    command: ["tidy"]

  # One-shot digest generation
  mail-digest:
    build: .
    env_file: .env
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./reports:/app/reports
    command: ["digest"]

  # Cron scheduler — runs tidy every 30min and digest at 8am/5pm
  cron:
    build: .
    env_file: .env
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./reports:/app/reports
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo '30 * * * * cd /app && python -m openclaw_mail.cli tidy >> /app/logs/tidy_cron.log 2>&1' > /etc/cron.d/mail-agent
        echo '0 8 * * * cd /app && python -m openclaw_mail.cli digest >> /app/logs/digest_cron.log 2>&1' >> /etc/cron.d/mail-agent
        echo '0 17 * * * cd /app && python -m openclaw_mail.cli digest >> /app/logs/digest_cron.log 2>&1' >> /etc/cron.d/mail-agent
        chmod 0644 /etc/cron.d/mail-agent
        crontab /etc/cron.d/mail-agent
        echo "Cron jobs installed. Starting cron daemon..."
        cron -f

  # IAMQ sidecar — inter-agent messaging (Elixir/OTP, zero-install)
  iamq:
    image: openclaw-iamq-sidecar:latest
    restart: unless-stopped
    environment:
      IAMQ_HTTP_URL: http://host.docker.internal:18790
      IAMQ_WS_URL: ws://host.docker.internal:18793/ws
      IAMQ_AGENT_ID: mail_agent
      IAMQ_AGENT_NAME: Openclaw
      IAMQ_AGENT_EMOJI: "\U0001F980"
      IAMQ_AGENT_DESC: "Multi-account email management and auto-filing. Runs a 4-step filtering pipeline across DavMail and Gmail accounts."
      IAMQ_AGENT_CAPABILITIES: email_tidy,email_digest,folder_management,rule_engine,email_filtering,inbox_summary
      IAMQ_HEARTBEAT_MS: "300000"
      IAMQ_POLL_MS: "60000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Run tests
  test:
    build: .
    volumes:
      - ./tests:/app/tests:ro
      - ./openclaw_mail:/app/openclaw_mail:ro
      - ./config:/app/config:ro
    entrypoint: ["python", "-m", "pytest"]
    command: ["-v", "--tb=short"]
